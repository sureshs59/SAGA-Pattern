server.port=8080
spring.application.name=bank-saga-pattern

# H2 Database
spring.datasource.url=jdbc:h2:mem:sagadb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=bank-saga-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.bank.saga.*

# Kafka Topics
kafka.topic.order-created=order-created
kafka.topic.payment-processed=payment-processed
kafka.topic.payment-failed=payment-failed
kafka.topic.inventory-reserved=inventory-reserved
kafka.topic.inventory-failed=inventory-failed
kafka.topic.order-completed=order-completed
kafka.topic.order-cancelled=order-cancelled
kafka.topic.notification-send=notification-send

# Logging
logging.level.com.bank.saga=DEBUG